appId: com.electron.arts-entra-toolbox
productName: "Art's Entra Toolbox"
copyright: Copyright © 2026

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json

# Don't bundle devDependencies into the app (saves size)
asar: true

win:
  signAndEditExecutable: false
  target:
    - target: nsis
      arch: x64
    - target: portable
      arch: x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: "Art's Entra Toolbox"

mac:
  identity: null
  target:
    - target: dmg
      arch: x64
    - target: dmg
      arch: arm64

linux:
  target:
    - target: AppImage
      arch: x64
  category: Utility
