appId: com.electron.arts-entra-toolbox
productName: "Art's Entra Toolbox"
copyright: Copyright © 2026

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json

# Don't bundle devDependencies into the app (saves size)
asar: true

win:
  # Unsigned build — avoids winCodeSign download/extract issues on locked-down machines
  # If you add an icon later, put it in build/icon.ico and uncomment:
  # icon: build/icon.ico
  signAndEditExecutable: false
  target:
    - target: nsis
      arch: x64
    - target: portable
      arch: x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: "Art's Entra Toolbox"

