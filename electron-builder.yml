appId: com.electron.entra-toolbox
productName: "Entra Toolbox"
copyright: Copyright © 2026
icon: assets/icon.png

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json

# Copy the icon outside the asar so the main process can load it at runtime
# (BrowserWindow taskbar icon, especially on Linux).
extraResources:
  - from: assets/icon.png
    to: icon.png

asar: true

win:
  signAndEditExecutable: false
  target:
    - target: nsis
      arch: x64
    - target: portable
      arch: x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: "Entra Toolbox"
  artifactName: entra-toolbox-${version}-windows-setup.${ext}

portable:
  artifactName: entra-toolbox-${version}-windows-portable.${ext}

mac:
  identity: null
  artifactName: entra-toolbox-${version}-macos-${arch}.${ext}
  target:
    - target: dmg
      arch: x64
    - target: dmg
      arch: arm64

linux:
  artifactName: entra-toolbox-${version}-linux-${arch}.${ext}
  target:
    - target: AppImage
      arch: x64
  category: Utility
